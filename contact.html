        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>

            <div class="page-header-overlay subtle-overlay"></div>
            <div class="container fade-up-element text-center">

            </div>
            <div class="animated-moon" style="right: 15%; top: 20%;"></div>
        </section>

                    <p class="text-sand-muted mb-4">We're here to arrange your perfect scenic escape.</p>

                    <div class="contact-item float-ui">
                        <div class="contact-icon text-aqua">📞</div>
                        <div>
                            <h4>Phone</h4>
                            <p class="text-sand-muted">+91 9746167994</p>
                        </div>
                    </div>

                    <div class="contact-item float-ui-delayed">
                        <div class="contact-icon text-aqua">✉️</div>
                        <div>
                            <h4>Email</h4>
                            <p class="text-sand-muted">mooonisland21@gmail.com</p>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="glass-card rounded-2xl fade-up-element slide-in-right p-4">
                    <h2 class="section-heading text-white">Send a Message</h2>
                    <form id="contact-form" class="contact-form mt-4">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" class="form-control rounded-2xl" placeholder="Your Name" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" class="form-control rounded-2xl" placeholder="+91 00000 00000" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message / Inquiry</label>
                            <textarea id="message" class="form-control rounded-2xl" placeholder="Tell us what you're looking for..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-outline mt-2 ripple rounded-2xl w-100">Send Request</button>
                    </form>
                </div>

            </div>

            <!-- Google Map -->
            <div class="map-container fade-up-element rounded-2xl mt-8" style="height: 350px;">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3929.56993181816!2d76.3533441!3d9.670355!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b087da344ea1d5d%3A0xc31bc2c231711200!2sMurinjapuzha%20Bridge!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>

        <p>&copy; 2026 Moon Island. A Hidden Island of Calm.</p>
    </footer>
